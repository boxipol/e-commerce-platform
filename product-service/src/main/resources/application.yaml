logging:
  level:
    org.apache.kafka: WARN
    org.springframework.kafka: WARN

spring:
  application:
    name: product-service

  kafka:
    bootstrap-servers: kafka:9092

    consumer:
      group-id: ecommerce-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring:
          json:
            trusted:
              packages: com.pd.ecommerce.event

  cassandra:
    contact-points: products-db
    port: 9042
    keyspace-name: ecommerce
    local-datacenter: datacenter1
    username: ${CASSANDRA_USERNAME}
    password: ${CASSANDRA_PASSWORD}

  data:
    redis:
      host: redis
      port: 6379
      repositories:
        enabled: false

management:
  otlp:
    metrics:
      export:
        url: http://otel-lgtm:4318/v1/metrics
        step: 10s
    tracing:
      endpoint: http://otel-lgtm:4318/v1/traces
    logging:
      endpoint: http://otel-lgtm:4318/v1/logs
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics