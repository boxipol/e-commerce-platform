image: maven:3.9.11-eclipse-temurin-17

stages:
  - test
  - docker
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

# Per-branch+job cache so branches don't pollute each other.
cache:
  key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
  paths:
    - .m2/repository

default:
  interruptible: true


# =====================================================
# TEST
# =====================================================

test:
  stage: test
  services:
    - name: docker:27-dind
  variables:
    # Disable TLS so the Maven image can reach the DinD socket over plain TCP.
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_HOST_OVERRIDE: docker
    # Ryuk (Testcontainers reaper) cannot reach back to the DinD host in CI.
    TESTCONTAINERS_RYUK_DISABLED: "true"
  script:
    - mvn -B test


# =====================================================
# COMMON DOCKER TEMPLATE
# =====================================================

.docker-template:
  stage: docker
  image: docker:27
  services:
    - name: docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    # Required for RUN --mount=type=cache in Dockerfiles.
    DOCKER_BUILDKIT: "1"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" -f "$MODULE_PATH/Dockerfile" .
    - docker push "$CI_REGISTRY_IMAGE/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - docker tag  "$CI_REGISTRY_IMAGE/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/$IMAGE_NAME:latest"
    - docker push "$CI_REGISTRY_IMAGE/$IMAGE_NAME:latest"


# =====================================================
# COMMON DEPLOY TEMPLATE
# =====================================================

.deploy-template:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
  script:
    - kubectl set image deployment/$SERVICE_NAME $SERVICE_NAME=$CI_REGISTRY_IMAGE/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA -n ecommerce
    - kubectl rollout status deployment/$SERVICE_NAME -n ecommerce --timeout=120s
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


#=====================================================
# K8S SECRETS
#====================================================

deploy:k8s-registry-secret:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
  script:
    - kubectl get ns ecommerce >/dev/null 2>&1 || kubectl create ns ecommerce
    - |
      kubectl -n ecommerce create secret docker-registry gitlab-registry \
        --docker-server="$CI_REGISTRY" \
        --docker-username="$CI_REGISTRY_USER" \
        --docker-password="$CI_REGISTRY_PASSWORD" \
        --docker-email="petyo_dobrev@icloud.com" \
        --dry-run=client -o yaml | kubectl apply -f -
    - kubectl -n ecommerce patch serviceaccount default --type merge -p '{"imagePullSecrets":[{"name":"gitlab-registry"}]}'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:k8s-secrets:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
  script:
    - kubectl get ns ecommerce >/dev/null 2>&1 || kubectl create ns ecommerce
    - |
      kubectl -n ecommerce create secret generic ecommerce-secrets \
        --from-literal=JWT_SECRET="$JWT_SECRET" \
        --from-literal=POSTGRES_USER="$POSTGRES_USER" \
        --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
        --from-literal=CASSANDRA_USERNAME="$CASSANDRA_USERNAME" \
        --from-literal=CASSANDRA_PASSWORD="$CASSANDRA_PASSWORD" \
        --from-literal=SMTP_USER="$SMTP_USER" \
        --from-literal=SMTP_PASSWORD="$SMTP_PASSWORD" \
        --from-literal=STRIPE_API_KEY="$STRIPE_API_KEY" \
        --from-literal=STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
        --from-literal=PAYPAL_CLIENT_ID="$PAYPAL_CLIENT_ID" \
        --from-literal=PAYPAL_CLIENT_SECRET="$PAYPAL_CLIENT_SECRET" \
        --dry-run=client -o yaml | kubectl apply -f -
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


# =====================================================
# API GATEWAY
# =====================================================

docker:gateway:
  extends: .docker-template
  variables:
    IMAGE_NAME: gateway-service
    MODULE_PATH: gateway-service
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - gateway-service/**/*
        - pom.xml

deploy:gateway:
  extends: .deploy-template
  needs:
    - "docker:gateway"
    - "deploy:k8s-registry-secret"
    - "deploy:k8s-secrets"
  variables:
    SERVICE_NAME: gateway-service
    IMAGE_NAME: gateway-service
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - gateway-service/**/*
        - pom.xml


