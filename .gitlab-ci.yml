image: maven:3.9.11-eclipse-temurin-17

stages:
  - validate
  - test
  - package
  - docker

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  DOCKER_TLS_CERTDIR: "/certs"

cache:
  key: maven
  paths:
    - .m2/repository

default:
  interruptible: true

validate:
  stage: validate
  script:
    - mvn -B validate

test:
  stage: test
  script:
    - mvn -B test


# =====================================================
# COMMON PACKAGE TEMPLATE
# =====================================================

.package-template:
  stage: package
  script:
    - mvn -B -pl :$MODULE_NAME -am clean package -DskipTests
  artifacts:
    paths:
      - $MODULE_PATH/target/*.jar
    expire_in: 1 hour


# =====================================================
# COMMON DOCKER TEMPLATE
# =====================================================

.docker-template:
  stage: package
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"


# =====================================================
# API GATEWAY
# =====================================================

package:gateway:
  extends: .package-template
  variables:
    MODULE_NAME: gateway-service
    MODULE_PATH: gateway-service
  rules:
    - changes:
        - gateway-service/**/*
        - pom.xml
        - common/**/*

docker:gateway:
  extends: .docker-template
  variables:
    IMAGE_NAME: gateway-service
    MODULE_PATH: gateway-service
  needs:
    - package:gateway
  rules:
    - changes:
        - gateway-service/**/*
        - pom.xml
        - common/**/*


