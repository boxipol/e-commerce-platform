server:
  port: 8081

spring:
  application:
    name: authentication-service

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    h2:
      console:
        enabled: true
    jpa:
      hibernate:
        ddl-auto: create-drop
      show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/