server:
  port: 8085

logging:
  level:
    org.springframework.r2dbc: INFO

spring:
  application:
    name: payment-service

  r2dbc:
    url: r2dbc:postgresql://payments-db:5432/payments_db
    username: ecommerce_user
    password: ecommerce_pass

    sql:
      init:
        mode: always

  kafka:
    bootstrap-servers: kafka:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    # testing
    consumer:
      group-id: ecommerce-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

payment:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:test}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:test}

  paypal:
    client-id: ${PAYPAL_CLIENT_ID:1234}
    client-secret: ${PAYPAL_CLIENT_SECRET:test}
    base-url: https://api-m.sandbox.paypal.com