apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: ecommerce
type: Opaque
stringData:
  # Template only. Real values are injected by GitLab CI deploy:k8s-secrets.
  JWT_SECRET: <set-in-gitlab-ci-var>
  POSTGRES_USER: <set-in-gitlab-ci-var>
  POSTGRES_PASSWORD: <set-in-gitlab-ci-var>
  CASSANDRA_USERNAME: <set-in-gitlab-ci-var>
  CASSANDRA_PASSWORD: <set-in-gitlab-ci-var>
  SMTP_USER: <set-in-gitlab-ci-var>
  SMTP_PASSWORD: <set-in-gitlab-ci-var>
  STRIPE_API_KEY: <set-in-gitlab-ci-var>
  STRIPE_WEBHOOK_SECRET: <set-in-gitlab-ci-var>
  PAYPAL_CLIENT_ID: <set-in-gitlab-ci-var>
  PAYPAL_CLIENT_SECRET: <set-in-gitlab-ci-var>



