apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: products-db
  namespace: ecommerce
spec:
  serviceName: products-db
  replicas: 1
  selector:
    matchLabels:
      app: products-db
  template:
    metadata:
      labels:
        app: products-db
    spec:
      containers:
        - name: cassandra
          image: cassandra:5.0.8
          ports:
            - containerPort: 9042
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: ecommerce-cluster
            - name: CASSANDRA_DC
              value: datacenter1
            - name: CASSANDRA_RACK
              value: rack1
            - name: MAX_HEAP_SIZE
              value: 512M
            - name: HEAP_NEWSIZE
              value: 128M
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
          readinessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 40
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: products-db
  namespace: ecommerce
spec:
  clusterIP: None
  selector:
    app: products-db
  ports:
    - name: cql
      port: 9042
      targetPort: 9042
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cassandra-init
  namespace: ecommerce
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: cassandra-init
          image: cassandra:5.0.8
          command:
            - /bin/sh
            - -c
            - |
              until cqlsh products-db 9042 -e 'describe keyspaces' >/dev/null 2>&1; do
                echo "Waiting for Cassandra..."
                sleep 5
              done
              cqlsh products-db 9042 -e "CREATE KEYSPACE IF NOT EXISTS ecommerce WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"

---

