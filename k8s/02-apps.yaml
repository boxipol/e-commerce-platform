      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: user-service
          image: registry.gitlab.com/portfolio8543146/e-commerce-platform/user-service:latest
          imagePullPolicy: IfNotPresent
