version: "3.9"

services:

  users-db:
    image: postgres:16
    container_name: users-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d users_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  orders-db:
    image: postgres:16
    container_name: orders-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d orders_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    depends_on:
      products-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  products-db:
    image: cassandra:5.0.8
    container_name: products-db
    ports:
      - "9042:9042"
    volumes:
      - products-db-data:/var/lib/cassandra
    networks:
      - ecommerce-network
    environment:
      CASSANDRA_CLUSTER_NAME: ecommerce-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_USERNAME: ${CASSANDRA_USERNAME}
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD}
      CASSANDRA_AUTHENTICATOR: PasswordAuthenticator
      CASSANDRA_AUTHORIZER: CassandraAuthorizer
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: [
        "CMD-SHELL",
        "cqlsh localhost 9042 -u $$CASSANDRA_USERNAME -p $$CASSANDRA_PASSWORD -e 'describe keyspaces'"
      ]
      interval: 20s
      timeout: 10s
      retries: 10

  payments-db:
    image: postgres:16
    container_name: payments-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    volumes:
      - payments-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d payments_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory-db:
    image: postgres:16
    container_name: inventory-db
    restart: unless-stopped
    ports:
      - "5435:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d inventory_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    networks:
      - ecommerce-network
    ports:
      - "29092:29092"
    environment:
      # KRaft mode ENABLED
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # single-node cluster safety
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/9092'" ]
      interval: 5s
      timeout: 5s
      retries: 10


volumes:
  products-db-data:
  orders-db-data:
  users-db-data:
  payments-db-data:
  inventory-db-data:


networks:
  ecommerce-network: