server:
  port: 8081

spring:
  application:
    name: service-template

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    h2:
      console:
        enabled: true
    jpa:
      hibernate:
        ddl-auto: create-drop
      show-sql: true

