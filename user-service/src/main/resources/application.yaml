logging:
  level:
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    org.springframework.r2dbc: WARN

spring:
  application:
    name: user-service

  kafka:
    bootstrap-servers: kafka:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

    # testing
    consumer:
      group-id: ecommerce-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

  r2dbc:
    url: r2dbc:postgresql://users-db:5432/users_db
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  flyway:
    enabled: true
    url: jdbc:postgresql://users-db:5432/users_db
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}


management:
  otlp:
    metrics:
      export:
        url: http://otel-lgtm:4318/v1/metrics
        step: 30s
        read-timeout: 30s
    tracing:
      endpoint: http://otel-lgtm:4318/v1/traces
    logging:
      endpoint: http://otel-lgtm:4318/v1/logs
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jwt:
  secret: ${JWT_SECRET}
  # 1 hour
  expiration: 3600000