server:
  port: 8081

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/users/**

            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/orders/**

            - id: product-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/products/**

            - id: payment-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/payments/**

            - id: notification-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/notifications/**

            - id: inventory-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/inventories/**

            - id: user-service-docs
              uri: http://localhost:8082
              predicates:
                - Path=/user-service/v3/api-docs
              filters:
                - RewritePath=/user-service/(?<segment>.*), /${segment}

            - id: order-service-docs
              uri: http://localhost:8083
              predicates:
                - Path=/order-service/v3/api-docs
              filters:
                - RewritePath=/order-service/(?<segment>.*), /${segment}

            - id: product-service-docs
              uri: http://localhost:8084
              predicates:
                - Path=/product-service/v3/api-docs
              filters:
                - RewritePath=/product-service/(?<segment>.*), /${segment}

            - id: payment-service-docs
              uri: http://localhost:8085
              predicates:
                - Path=/payment-service/v3/api-docs
              filters:
                - RewritePath=/payment-service/(?<segment>.*), /${segment}

            - id: inventory-service-docs
              uri: http://localhost:8087
              predicates:
                - Path=/inventory-service/v3/api-docs
              filters:
                - RewritePath=/inventory-service/(?<segment>.*), /${segment}

            - id: notification-service-docs
              uri: http://localhost:8086
              predicates:
                - Path=/notification-service/v3/api-docs
              filters:
                - RewritePath=/notification-service/(?<segment>.*), /${segment}

management:
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
    tracing:
      endpoint: http://localhost:4318/v1/traces
    logging:
      endpoint: http://localhost:4318/v1/logs