server:
  port: 8081

logging:
  level:
    org.springframework.cloud.gateway: INFO

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: never

spring:

  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8082
              predicates:
                - Path=/api/v1/users/**

            - id: order-service
              uri: http://order-service:8083
              predicates:
                - Path=/api/v1/orders/**

            - id: product-service
              uri: http://product-service:8084
              predicates:
                - Path=/api/v1/products/**

            - id: payment-service
              uri: http://payment-service:8085
              predicates:
                - Path=/api/v1/payments/**

            - id: notification-service
              uri: http://notification-service:8086
              predicates:
                - Path=/api/v1/notifications/**

            - id: inventory-service
              uri: http://inventory-service:8087
              predicates:
                - Path=/api/v1/inventory/**

jwt:
  secret-file: ${JWT_SECRET_FILE}
  # 1 hour
  expiration: 3600000