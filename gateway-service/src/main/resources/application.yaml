logging:
  level:
    org.springframework.cloud.gateway: WARN

management:
  otlp:
    metrics:
      export:
        url: http://otel-lgtm:4318/v1/metrics
        step: 10s
    tracing:
      endpoint: http://otel-lgtm:4318/v1/traces
    logging:
      endpoint: http://otel-lgtm:4318/v1/logs
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: never

spring:

  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8080
              predicates:
                - Path=/api/v1/users/**

            - id: order-service
              uri: http://order-service:8080
              predicates:
                - Path=/api/v1/orders/**

            - id: product-service
              uri: http://product-service:8080
              predicates:
                - Path=/api/v1/products/**

            - id: payment-service
              uri: http://payment-service:8080
              predicates:
                - Path=/api/v1/payments/**

            - id: notification-service
              uri: http://notification-service:8080
              predicates:
                - Path=/api/v1/notifications/**

            - id: inventory-service
              uri: http://inventory-service:8080
              predicates:
                - Path=/api/v1/inventories/**

jwt:
  secret: ${JWT_SECRET}
  # 1 hour
  expiration: 3600000