logging:
  level:
    org.springframework.cloud.gateway: WARN

management:
  otlp:
    metrics:
      export:
        url: http://otel-lgtm:4318/v1/metrics
        step: 30s
        read-timeout: 30s
    tracing:
      endpoint: http://otel-lgtm:4318/v1/traces
    logging:
      endpoint: http://otel-lgtm:4318/v1/logs
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: never

spring:

  application:
    name: gateway-service

  data:
    redis:
      host: redis
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8080
              predicates:
                - Path=/api/v1/users/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userOrIpKeyResolver}"

            - id: order-service
              uri: http://order-service:8080
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userOrIpKeyResolver}"

            - id: product-service
              uri: http://product-service:8080
              predicates:
                - Path=/api/v1/products/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 50
                    redis-rate-limiter.burstCapacity: 100
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userOrIpKeyResolver}"

            - id: payment-service
              uri: http://payment-service:8080
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userOrIpKeyResolver}"

            - id: notification-service
              uri: http://notification-service:8080
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userOrIpKeyResolver}"

            - id: inventory-service
              uri: http://inventory-service:8080
              predicates:
                - Path=/api/v1/inventories/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userOrIpKeyResolver}"

            # API docs routes for gateway aggregation
            - id: user-service-docs
              uri: http://user-service:8080
              predicates:
                - Path=/user-service/v3/api-docs
              filters:
                - RewritePath=/user-service/(?<segment>.*), /${segment}

            - id: order-service-docs
              uri: http://order-service:8080
              predicates:
                - Path=/order-service/v3/api-docs
              filters:
                - RewritePath=/order-service/(?<segment>.*), /${segment}

            - id: product-service-docs
              uri: http://product-service:8080
              predicates:
                - Path=/product-service/v3/api-docs
              filters:
                - RewritePath=/product-service/(?<segment>.*), /${segment}

            - id: payment-service-docs
              uri: http://payment-service:8080
              predicates:
                - Path=/payment-service/v3/api-docs
              filters:
                - RewritePath=/payment-service/(?<segment>.*), /${segment}

            - id: inventory-service-docs
              uri: http://inventory-service:8080
              predicates:
                - Path=/inventory-service/v3/api-docs
              filters:
                - RewritePath=/inventory-service/(?<segment>.*), /${segment}

            - id: notification-service-docs
              uri: http://notification-service:8080
              predicates:
                - Path=/notification-service/v3/api-docs
              filters:
                - RewritePath=/notification-service/(?<segment>.*), /${segment}

springdoc:
  swagger-ui:
    urls:
      - name: gateway
        url: /v3/api-docs
      - name: user-service
        url: /user-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
      - name: inventory-service
        url: /inventory-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs
    disable-swagger-default-url: true

jwt:
  secret: ${JWT_SECRET}
  # 1 hour
  expiration: 3600000